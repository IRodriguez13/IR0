# Optional LOC telemetry for the ir0-loc dashboard (Render).
# Manual only — does not run on push/PR (avoids red CI noise).
name: Update LOC

on:
  workflow_dispatch:

jobs:
  contar-lineas:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends cloc

      - name: Count LOC
        run: |
          echo "Counting lines of code (C, C++, Rust, ASM)..."
          cloc --json \
               --include-lang=C,C++,"Assembly",Rust \
               --by-file-by-lang \
               . > loc.json
          echo "LOC count complete"

      - name: Ping LOC API
        run: |
          curl -sS --max-time 20 https://ir0-loc.onrender.com/ || true
          sleep 5

      - name: POST loc.json
        run: |
          curl -sS --max-time 60 -X POST https://ir0-loc.onrender.com/api/loc \
               -H "Content-Type: application/json" \
               -d @loc.json || true

      - name: Fetch and send contributors
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          curl -sS -H "Authorization: Bearer $GITHUB_TOKEN" \
               -H "Accept: application/vnd.github+json" \
               "https://api.github.com/repos/${OWNER}/${REPO}/contributors" \
               > contributors.json || true
          curl -sS --max-time 60 -X POST https://ir0-loc.onrender.com/api/contributors \
               -H "Content-Type: application/json" \
               -d @contributors.json || true
          echo "LOC telemetry step finished (best-effort)"
