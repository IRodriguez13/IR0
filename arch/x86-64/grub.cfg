set timeout=5
set default=0

menuentry "IR0 Kernel v0.0.1 (Framebuffer 1024x768)" {
    set gfxpayload=1024x768x32
    multiboot /boot/kernel-x64.bin
    boot
}

menuentry "IR0 Kernel - Text mode (80x25)" {
    set gfxpayload=text
    multiboot /boot/kernel-x64.bin
    boot
}

menuentry "IR0 Kernel - Framebuffer/Doom (1024x768)" {
    set gfxpayload=1024x768x32
    multiboot /boot/kernel-x64.bin
    boot
}

menuentry "IR0 Kernel - Debug" {
    multiboot /boot/kernel-x64.bin debug=1
    set gfxpayload=text
    boot
}

menuentry "IR0 Kernel - Safe Mode" {
    multiboot /boot/kernel-x64.bin --safe
    set gfxpayload=text
    boot
}
